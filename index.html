<body>

  <div class="app">
    <div class="header">
      <h1>Baby Gender Reveal</h1>
      <div class="subtitle">Scratch to find out!</div>
    </div>

    <div class="progress-container">
      <span class="progress-emoji-left">&#x1F466;</span>
      <div class="progress-track">
        <div class="progress-fill-boy" id="fillBoy"></div>
        <div class="progress-fill-girl" id="fillGirl"></div>
      </div>
      <span class="progress-emoji-right">&#x1F467;</span>
    </div>

    <div class="grid" id="grid"></div>

    <div class="instructions" id="instructions">Scratch to reveal!</div>
  </div>

  <div class="landscape-overlay">
    <div class="landscape-icon">&#x1F4F1;</div>
    <div class="landscape-text">Please rotate your device to portrait</div>
  </div>

  <div class="celebration" id="celebration">
    <h2>It's a Girl!</h2>
    <div class="due-date"></div>
    <img class="scan-photo" src="" alt="Baby scan" style="display:none">
    <div class="btn-row">
      <button class="restart-btn" id="restartBtn">Play Again</button>
      <button class="share-btn" id="shareBtn">Share</button>
    </div>
    <div class="parents"></div>
  </div>

  <!-- Configuration (edit config.js to customize) -->
  <script src="config.js"></script>
